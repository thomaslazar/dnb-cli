name: Build and Test

on:
  pull_request:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Check formatting
        run: dotnet format DnbCli.sln --verify-no-changes
      - name: Run unit tests
        run: dotnet test tests/DnbCli.Tests/DnbCli.Tests.csproj

  smoke-test:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build AOT binary
        run: >
          dotnet publish src/DnbCli/DnbCli.csproj
          -c Release -r linux-x64 --self-contained true /p:PublishAot=true
          -o ./publish
      - name: Run smoke tests against live DNB
        run: bash tools/smoke-test.sh
        env:
          CLI: ./publish/dnb-cli

  build:
    needs: unit-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-latest
            rid: osx-x64
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Publish
        run: >
          dotnet publish src/DnbCli/DnbCli.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishAot=true
      - name: Run self-test (AOT integrity check)
        shell: bash
        run: |
          BIN="src/DnbCli/bin/Release/net10.0/${{ matrix.rid }}/publish/dnb-cli"
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe"
          "${BIN}" self-test
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dnb-cli-${{ matrix.rid }}
          path: src/DnbCli/bin/Release/net10.0/${{ matrix.rid }}/publish/
      - name: Attach binary to GitHub Release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BIN="src/DnbCli/bin/Release/net10.0/${{ matrix.rid }}/publish/dnb-cli"
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe"
          EXT=""
          [[ "$BIN" == *.exe ]] && EXT=".exe"
          cp "$BIN" "dnb-cli-${{ matrix.rid }}${EXT}"
          gh release upload "${{ github.event.release.tag_name }}" "dnb-cli-${{ matrix.rid }}${EXT}"
